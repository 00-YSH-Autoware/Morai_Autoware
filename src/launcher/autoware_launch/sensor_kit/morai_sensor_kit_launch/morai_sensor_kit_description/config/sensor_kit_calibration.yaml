# sensor_kit_base_link 기준 각 센서 프레임 오프셋 (MORAI sensor kit)
# MORAI 는 lidar/imu 를 동일 위치/자세(identity extrinsic)로 두는 것을 전제로 한다.
# 실제 MORAI Sensor-Settings 의 센서 마운트에 맞춰 값을 조정할 것.
sensor_kit_base_link:
  # LiDAR (지붕). 기본 높이 1.8 m — MORAI 마운트에 맞게 조정.
  velodyne_top:
    x: 0.0
    y: 0.0
    z: 1.8
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  # IMU. lidar 와 동일 위치/자세 전제.
  imu_link:
    x: 0.0
    y: 0.0
    z: 1.8
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  # GNSS 안테나. 변환 노드가 frame_id 를 강제하므로 위치만 의미.
  gnss_link:
    x: 0.0
    y: 0.0
    z: 1.8
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
