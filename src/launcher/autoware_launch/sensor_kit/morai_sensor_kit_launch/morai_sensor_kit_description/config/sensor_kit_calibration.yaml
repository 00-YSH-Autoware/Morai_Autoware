# sensor_kit_base_link 기준 각 센서 프레임 오프셋 (MORAI sensor kit)
# Autoware base_link = 뒷차축 중심(지면). MORAI Sensor-Settings 실측 마운트값.
# 센서는 뒷차축 +1m 앞(x=1.0). lidar 높이 1.3 m, imu/gnss 1.15 m.
sensor_kit_base_link:
  # LiDAR (지붕). 프레임명은 MORAI /lidar/points 의 header.frame_id(lidar)와 일치.
  lidar:
    x: 1.0
    y: 0.0
    z: 1.3
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  # IMU. 프레임명은 MORAI /Imu 의 header.frame_id(imu)와 일치.
  imu:
    x: 1.0
    y: 0.0
    z: 1.15
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  # GNSS 안테나. 변환 노드가 frame_id 를 gnss_link 로 강제하므로 위치만 의미.
  gnss_link:
    x: 1.0
    y: 0.0
    z: 1.15
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
